name: Build Android APK
on:
  push:
    branches:
      - main
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y build-essential git zip unzip libffi-dev libssl-dev libncurses5-dev zlib1g-dev autoconf automake libtool pkg-config cmake libltdl-dev python3-dev
      - name: Install buildozer
        run: pip install "cython==0.29.37" buildozer virtualenv
      - name: Build APK
        run: buildozer android debug 2>&1 | tee build.log
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: KingApp-APK
          path: bin/*.apk
          if-no-files-found: warn
          retention-days: 30
      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7
